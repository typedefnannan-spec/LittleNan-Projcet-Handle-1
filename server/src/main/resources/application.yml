server:
  port: 9191

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    druid:
      driver-class-name: ${nan.datasource.driver-class-name}
      url: jdbc:mysql://${nan.datasource.host}:${nan.datasource.port}/${nan.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: ${nan.datasource.username}
      password: ${nan.datasource.password}

mybatis:
  #Dao 配置
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.WM.entity
  configuration:
    #驼峰命名
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      nan:
        mapper: debug
        service: info
        controller: info

nan:
  jwt:
    #JWT令牌密钥
    admin-secret-key: TypedefNan
    #过期时间
    admin-ttl: 7200000
    #JWT请求头名字
    admin-token-name: token
